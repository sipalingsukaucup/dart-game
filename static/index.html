<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Shooter Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --gold: #ffd60a;
            --green: #57cc99;
            --dim: #8d99ae;
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #edf2f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 3px
            );
            pointer-events: none;
            z-index: 1;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1, h2, h3 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
        }

        /* Login Screen */
        #login-screen {
            z-index: 10;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 2px linear-gradient(to right, var(--red), var(--gold));
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            min-width: 320px;
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.2);
        }

        .login-card h1 {
            color: var(--gold);
            font-size: 3rem;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .login-form label {
            font-family: 'Share Tech Mono', monospace;
            color: var(--dim);
            font-size: 0.9rem;
        }

        .player-select-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"], select {
            background: #070710;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            font-size: 1.1rem;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--red);
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, var(--red), #c92a3a);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.2rem;
            font-family: 'Bebas Neue', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(230, 57, 70, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--dim), #6a737d);
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 20px rgba(141, 153, 174, 0.3);
        }

        .existing-players {
            margin-top: 20px;
        }

        .existing-players h3 {
            font-size: 1rem;
            color: var(--dim);
            margin-bottom: 10px;
        }

        .existing-players select {
            padding: 10px 16px;
            font-size: 1rem;
        }

        /* Game Screen */
        #game-screen {
            position: relative;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .hud {
            display: flex;
            gap: 40px;
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 2px linear-gradient(to right, var(--red), var(--gold));
            border-radius: 12px;
            padding: 15px 30px;
            font-family: 'Share Tech Mono', monospace;
            min-width: 400px;
            justify-content: space-between;
        }

        .hud-item {
            text-align: center;
        }

        .hud-label {
            font-size: 0.85rem;
            color: var(--dim);
            margin-bottom: 5px;
        }

        .hud-value {
            font-size: 1.8rem;
            color: var(--text);
        }

        .hud-value.timer {
            color: var(--text);
        }

        .hud-value.timer.warning {
            color: var(--red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background: #070710;
            display: block;
            cursor: crosshair;
        }

        /* Floating text */
        .floating-text {
            position: absolute;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 5;
        }

        .floating-text.hit {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        .floating-text.miss {
            color: var(--red);
            font-size: 1.2rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* Leaderboard Screen */
        #leaderboard-screen {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            z-index: 20;
        }

        .leaderboard-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 2px linear-gradient(to right, var(--red), var(--gold));
            border-radius: 12px;
            padding: 40px;
            min-width: 500px;
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.2);
        }

        .leaderboard-card h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .leaderboard-card h1.win {
            color: var(--gold);
        }

        .leaderboard-card h1.lose {
            color: var(--red);
        }

        .result-info {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Share Tech Mono', monospace;
        }

        .result-info .player-name {
            color: var(--gold);
            font-size: 1.4rem;
        }

        .result-info .score {
            color: var(--green);
            font-size: 2rem;
        }

        .result-info .misses {
            color: var(--red);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            font-family: 'Rajdhani', sans-serif;
        }

        th {
            color: var(--dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            border-bottom: 1px solid #1e1e2e;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr.winner td {
            background: rgba(255, 214, 10, 0.1);
            border-left: 3px solid var(--gold);
        }

        .medal {
            margin-right: 8px;
        }

        .leaderboard-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .leaderboard-buttons .btn {
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 25px;
            }
            .login-card h1 {
                font-size: 2rem;
            }
            .hud {
                flex-direction: column;
                gap: 15px;
                min-width: 300px;
            }
            .hud-value {
                font-size: 1.4rem;
            }
            .leaderboard-card {
                min-width: 90%;
                padding: 20px;
            }
            .leaderboard-card h1 {
                font-size: 1.8rem;
            }
            .canvas-wrapper canvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>Dart Shooter</h1>
            <div class="login-form">
                <div class="player-select-container">
                    <select id="existing-player">
                        <option value="">Select existing player</option>
                    </select>
                    <button class="btn btn-secondary" id="select-player-btn" disabled>Login</button>
                </div>
                <div style="text-align: center; margin: 10px 0;">
                    <span style="color: var(--dim); font-size: 0.9rem;">or</span>
                </div>
                <label>New Player Name</label>
                <input type="text" id="new-player-name" placeholder="Enter your name..." maxlength="20">
            </div>
            <button class="btn" id="create-player-btn">Play Game</button>
            <div class="existing-players">
                <h3>Existing Players</h3>
                <select id="existing-players-list">
                    <option value="">-- No players yet --</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-container">
            <div class="hud">
                <div class="hud-item">
                    <div class="hud-label">PLAYER</div>
                    <div class="hud-value" id="hud-player">Player</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">TIME</div>
                    <div class="hud-value timer" id="hud-timer">03:00</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">SCORE</div>
                    <div class="hud-value" id="hud-score">0</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">MISSES</div>
                    <div class="hud-value" id="hud-misses">0/5</div>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="800" height="600"></canvas>
            </div>
        </div>
    </div>

    <!-- Leaderboard Screen -->
    <div id="leaderboard-screen" class="screen">
        <div class="leaderboard-card">
            <h1 id="end-message" class="lose">GAME OVER</h1>
            <div class="result-info">
                <div>Player: <span class="player-name" id="result-player-name">-</span></div>
                <div style="margin-top: 10px;">Score: <span class="score" id="result-score">0</span></div>
                <div>Misses: <span class="misses" id="result-misses">0</span></div>
            </div>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Best Score</th>
                        <th>Games</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--dim);">Loading leaderboard...</td>
                    </tr>
                </tbody>
            </table>
            <div class="leaderboard-buttons">
                <button class="btn" id="play-again-btn">Play Again</button>
                <button class="btn btn-secondary" id="change-player-btn">Change Player</button>
            </div>
        </div>
    </div>

    <script>
        // Game Constants
        const TARGET_RADIUS = 52;
        const MAX_MISSES = 5;
        const MAX_TIME = 180;
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;

        // State
        let gameState = {
            score: 0,
            misses: 0,
            timeLeft: MAX_TIME,
            gameActive: false,
            elapsed: 0,
            currentPlayer: null,
            target: {
                x: CANVAS_WIDTH / 2,
                y: CANVAS_HEIGHT / 2,
                dx: 1,
                dy: 1,
                speed: 1.2
            },
            particles: []
        };

        // DOM Elements
        const screens = {
            login: document.getElementById('login-screen'),
            game: document.getElementById('game-screen'),
            leaderboard: document.getElementById('leaderboard-screen')
        };

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // API Base URL
        const API_BASE = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initLoginScreen();
            initGameCanvas();
            setupEventListeners();
        });

        function initLoginScreen() {
            fetchPlayers();
        }

        async function fetchPlayers() {
            try {
                const response = await fetch(`${API_BASE}/api/players`);
                if (!response.ok) throw new Error('Failed to fetch players');
                const players = await response.json();
                updatePlayerSelect(players);
            } catch (error) {
                console.error('Error fetching players:', error);
            }
        }

        function updatePlayerSelect(players) {
            const existingPlayerSelect = document.getElementById('existing-player');
            const existingPlayersList = document.getElementById('existing-players-list');

            // Clear and repopulate
            existingPlayerSelect.innerHTML = '<option value="">Select existing player</option>';
            existingPlayersList.innerHTML = '';

            if (players.length === 0) {
                existingPlayersList.innerHTML = '<option value="">-- No players yet --</option>';
                document.getElementById('select-player-btn').disabled = true;
                return;
            }

            players.forEach(player => {
                const option = document.createElement('option');
                option.value = player.id;
                option.textContent = player.name;
                existingPlayerSelect.appendChild(option);

                const listOption = document.createElement('option');
                listOption.value = player.id;
                listOption.textContent = player.name;
                existingPlayersList.appendChild(listOption);
            });

            // Enable select button if there's a selection
            existingPlayerSelect.addEventListener('change', () => {
                document.getElementById('select-player-btn').disabled = existingPlayerSelect.value === '';
            });
        }

        function setupEventListeners() {
            // Login screen
            const createPlayerBtn = document.getElementById('create-player-btn');
            const selectPlayerBtn = document.getElementById('select-player-btn');
            const existingPlayerSelect = document.getElementById('existing-player');
            const newPlayerNameInput = document.getElementById('new-player-name');
            const existingPlayersList = document.getElementById('existing-players-list');

            createPlayerBtn.addEventListener('click', async () => {
                const name = newPlayerNameInput.value.trim();
                if (name) {
                    await registerPlayer(name);
                }
            });

            selectPlayerBtn.addEventListener('click', async () => {
                const playerId = existingPlayerSelect.value;
                if (playerId) {
                    await loginPlayer(playerId);
                }
            });

            // Play again / Change player
            document.getElementById('play-again-btn').addEventListener('click', () => {
                startGame();
            });

            document.getElementById('change-player-btn').addEventListener('click', () => {
                switchScreen('login');
            });

            // Canvas click
            canvas.addEventListener('mousedown', handleCanvasClick);

            // Handle enter key in input
            newPlayerNameInput.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter') {
                    const name = newPlayerNameInput.value.trim();
                    if (name) {
                        await registerPlayer(name);
                    }
                }
            });
        }

        async function registerPlayer(name) {
            try {
                const response = await fetch(`${API_BASE}/api/players`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                if (response.status === 409) {
                    // Player already exists, fetch their ID
                    const playerResponse = await fetch(`${API_BASE}/api/players/${encodeURIComponent(name)}`);
                    if (playerResponse.ok) {
                        const player = await playerResponse.json();
                        gameState.currentPlayer = player;
                        switchScreen('game');
                        startGame();
                    }
                } else if (response.ok) {
                    const player = await response.json();
                    gameState.currentPlayer = player;
                    switchScreen('game');
                    startGame();
                } else {
                    alert('Failed to create player');
                }
            } catch (error) {
                console.error('Error registering player:', error);
                alert('Failed to create player. Please try again.');
            }
        }

        async function loginPlayer(playerId) {
            try {
                const response = await fetch(`${API_BASE}/api/players/${playerId}`);
                if (response.ok) {
                    const player = await response.json();
                    gameState.currentPlayer = player;
                    switchScreen('game');
                    startGame();
                } else {
                    alert('Failed to login');
                }
            } catch (error) {
                console.error('Error logging in:', error);
                alert('Failed to login. Please try again.');
            }
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        // Canvas Setup
        function initGameCanvas() {
            // Handle high DPI displays
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = CANVAS_WIDTH * dpr;
            canvas.height = CANVAS_HEIGHT * dpr;
            canvas.style.width = `${CANVAS_WIDTH}px`;
            canvas.style.height = `${CANVAS_HEIGHT}px`;
            ctx.scale(dpr, dpr);
        }

        function startGame() {
            // Reset state
            gameState.score = 0;
            gameState.misses = 0;
            gameState.timeLeft = MAX_TIME;
            gameState.gameActive = true;
            gameState.elapsed = 0;

            // Reset target
            respawnTarget();

            // Update HUD
            document.getElementById('hud-player').textContent = gameState.currentPlayer.name;
            document.getElementById('hud-score').textContent = '0';
            document.getElementById('hud-misses').textContent = '0/5';
            document.getElementById('hud-timer').textContent = formatTime(MAX_TIME);
            document.getElementById('hud-timer').classList.remove('warning');

            // Start game loop
            gameLoop();

            // Start timer
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                gameState.elapsed++;

                // Update timer display
                document.getElementById('hud-timer').textContent = formatTime(gameState.timeLeft);

                if (gameState.timeLeft <= 30) {
                    document.getElementById('hud-timer').classList.add('warning');
                }

                if (gameState.timeLeft <= 0) {
                    endGame('win');
                }
            }, 1000);
        }

        function gameLoop() {
            if (!gameState.gameActive) return;

            update();
            draw();

            gameState.animationFrame = requestAnimationFrame(gameLoop);
        }

        function update() {
            const now = Date.now();
            if (now - gameState.lastUpdate < 16) return; // Cap at ~60fps
            gameState.lastUpdate = now;

            // Calculate speed based on elapsed time
            const speed = 1.2 + gameState.elapsed * 0.025;
            gameState.target.speed = speed;

            // Move target
            gameState.target.x += gameState.target.dx * gameState.target.speed;
            gameState.target.y += gameState.target.dy * gameState.target.speed;

            // Bounce off walls
            if (gameState.target.x - TARGET_RADIUS <= 0 || gameState.target.x + TARGET_RADIUS >= CANVAS_WIDTH) {
                gameState.target.dx *= -1;
                gameState.target.x = Math.max(TARGET_RADIUS, Math.min(gameState.target.x, CANVAS_WIDTH - TARGET_RADIUS));
            }
            if (gameState.target.y - TARGET_RADIUS <= 0 || gameState.target.y + TARGET_RADIUS >= CANVAS_HEIGHT) {
                gameState.target.dy *= -1;
                gameState.target.y = Math.max(TARGET_RADIUS, Math.min(gameState.target.y, CANVAS_HEIGHT - TARGET_RADIUS));
            }

            // Update particles
            gameState.particles = gameState.particles.filter(p => p.life > 0);
            gameState.particles.forEach(p => {
                p.y -= p.vy;
                p.life -= 0.05;
            });
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#070710';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw grid
            drawGrid();

            // Draw target
            drawTarget();

            // Draw particles
            gameState.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.font = 'bold 24px "Bebas Neue"';
                ctx.textAlign = 'center';
                ctx.fillText(p.text, p.x, p.y);
                ctx.globalAlpha = 1;
            });
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(30, 30, 60, 0.6)';
            ctx.lineWidth = 1;

            for (let x = 0; x <= CANVAS_WIDTH; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }

            for (let y = 0; y <= CANVAS_HEIGHT; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }
        }

        function drawTarget() {
            const { x, y } = gameState.target;

            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#e63946';

            // Draw rings from outside to inside
            // #1a1a2e → #e63946 → #f1faee → #1d3557 → #f1faee → #e63946 → #ffd60a (bullseye)

            // Outer ring (dark blue)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();

            // Second ring (red)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS * 0.85, 0, Math.PI * 2);
            ctx.fillStyle = '#e63946';
            ctx.fill();

            // Third ring (white)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS * 0.70, 0, Math.PI * 2);
            ctx.fillStyle = '#f1faee';
            ctx.fill();

            // Fourth ring (dark blue)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = '#1d3557';
            ctx.fill();

            // Fifth ring (white)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS * 0.40, 0, Math.PI * 2);
            ctx.fillStyle = '#f1faee';
            ctx.fill();

            // Sixth ring (red)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = '#e63946';
            ctx.fill();

            // Bullseye (gold)
            ctx.beginPath();
            ctx.arc(x, y, TARGET_RADIUS * 0.10, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd60a';
            ctx.fill();

            // Reset shadow
            ctx.shadowBlur = 0;

            // Crosshair lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;

            ctx.beginPath();
            ctx.moveTo(x - TARGET_RADIUS, y);
            ctx.lineTo(x + TARGET_RADIUS, y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x, y - TARGET_RADIUS);
            ctx.lineTo(x, y + TARGET_RADIUS);
            ctx.stroke();
        }

        function handleCanvasClick(e) {
            if (!gameState.gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            // Account for canvas scaling
            const cx = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
            const cy = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);

            const dx = cx - gameState.target.x;
            const dy = cy - gameState.target.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const ratio = distance / TARGET_RADIUS;

            if (ratio <= 1.0) {
                // Hit
                const points = getScorePoints(ratio);
                gameState.score += points;
                gameState.particles.push({
                    x: cx,
                    y: cy,
                    text: `+${points}`,
                    color: '#ffd60a',
                    vy: 2,
                    life: 1
                });
                updateScore();

                // Respawn target
                respawnTarget();
            } else {
                // Miss
                gameState.misses++;
                gameState.particles.push({
                    x: cx,
                    y: cy,
                    text: 'MISS!',
                    color: '#e63946',
                    vy: 2,
                    life: 1
                });
                updateMisses();

                if (gameState.misses >= MAX_MISSES) {
                    endGame('lose');
                }
            }
        }

        function getScorePoints(ratio) {
            if (ratio <= 0.06) return 50;
            if (ratio <= 0.14) return 40;
            if (ratio <= 0.26) return 30;
            if (ratio <= 0.42) return 20;
            if (ratio <= 0.60) return 15;
            if (ratio <= 0.78) return 10;
            return 5;
        }

        function respawnTarget() {
            const padding = TARGET_RADIUS + 10;
            gameState.target.x = Math.random() * (CANVAS_WIDTH - padding * 2) + padding;
            gameState.target.y = Math.random() * (CANVAS_HEIGHT - padding * 2) + padding;

            // Random angle, speed based on elapsed time
            const angle = Math.random() * Math.PI * 2;
            const speed = 1.2 + gameState.elapsed * 0.025;

            gameState.target.dx = Math.cos(angle);
            gameState.target.dy = Math.sin(angle);
            gameState.target.speed = speed;
        }

        function updateScore() {
            document.getElementById('hud-score').textContent = gameState.score;
        }

        function updateMisses() {
            document.getElementById('hud-misses').textContent = `${gameState.misses}/${MAX_MISSES}`;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function endGame(result) {
            gameState.gameActive = false;

            // Stop game loop and timer
            cancelAnimationFrame(gameState.animationFrame);
            clearInterval(gameState.timer);

            // Save score
            saveScore();

            // Show leaderboard
            showLeaderboard(result);
        }

        async function saveScore() {
            try {
                await fetch(`${API_BASE}/api/scores`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player_id: gameState.currentPlayer.id,
                        score: gameState.score,
                        misses: gameState.misses,
                        duration: gameState.elapsed
                    })
                });
            } catch (error) {
                console.error('Error saving score:', error);
            }
        }

        async function showLeaderboard(result) {
            switchScreen('leaderboard');

            const message = document.getElementById('end-message');
            if (result === 'win') {
                message.textContent = 'TIME UP!';
                message.className = 'win';
            } else {
                message.textContent = 'GAME OVER';
                message.className = 'lose';
            }

            document.getElementById('result-player-name').textContent = gameState.currentPlayer.name;
            document.getElementById('result-score').textContent = gameState.score;
            document.getElementById('result-misses').textContent = gameState.misses;

            await fetchLeaderboard();
        }

        async function fetchLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/api/leaderboard`);
                if (!response.ok) throw new Error('Failed to fetch leaderboard');
                const leaderboard = await response.json();

                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = '';

                if (leaderboard.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--dim);">No scores yet</td></tr>';
                    return;
                }

                leaderboard.forEach((entry, index) => {
                    const row = document.createElement('tr');
                    const rank = index + 1;
                    const isCurrentPlayer = entry.name === gameState.currentPlayer.name;

                    if (isCurrentPlayer) {
                        row.className = 'winner';
                    }

                    const medal = rank <= 3 ? getMedal(rank) : '';
                    row.innerHTML = `
                        <td>${medal}${rank}</td>
                        <td>${entry.name}</td>
                        <td>${entry.best_score}</td>
                        <td>${entry.games_played}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--red);">Failed to load leaderboard</td></tr>';
            }
        }

        function getMedal(rank) {
            const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
            return medals[rank] || '';
        }
    </script>
</body>
</html>
